services:
  searxng:
    image: searxng/searxng:latest
    container_name: nas-bridge-searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8787}:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8787}/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
